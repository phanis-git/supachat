erver {
    listen 80;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /agent/ {
    proxy_pass http://devops-agent:8001/agent/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    }
}
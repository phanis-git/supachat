version: "3"

services:
  backend:
    build: ./backend
    expose:
      - "8000"
    env_file:
    - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1

  frontend:
    build: ./frontend
    expose:
      - "80"
    dns:
      - 8.8.8.8
      - 1.1.1.1

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3002:3000"

  devops-agent:
    build: ./devops-agent
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # ← allows agent to control Docker
    depends_on:
      - backend
      - frontend